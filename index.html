<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- FavIco-->
        <link rel="apple-touch-icon" sizes="180x180" href="./res/favico/apple-touch-icon.png">
        <link rel="icon" type="image/png" sizes="32x32" href="./res/favico/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="./res/favico/favicon-16x16.png">
        <link rel="manifest" href="./res/favico/site.webmanifest">
        <link rel="mask-icon" href="./res/favico/safari-pinned-tab.svg" color="#5bbad5">
        <meta name="msapplication-TileColor" content="#da532c">
        <meta name="theme-color" content="#ffffff">
        <!-- !FavIco -->
        <title>Quick!</title>
        <link href="style.css" rel="stylesheet">
    </head>

    <body>
        <header>
            <div class="card">
                <h1>What is the capital of...?</h1>
            </div>
        </header>
        <main>
            <div class="grid">
                <div class="flip-card">
                    <div class="flip-card-inner">
                        <div class="flip-card-front">
                            <p>Colombia</p>
                        </div>
                        <div class="flip-card-back">
                            <p>Bogota</p>
                        </div>
                    </div>
                </div>
                <div class="flip-card">
                    <div class="flip-card-inner">
                        <div class="flip-card-front">
                            <p>Finland</p>
                        </div>
                        <div class="flip-card-back">
                            <p>Helsinki</p>
                        </div>
                    </div>
                </div>
                <div class="flip-card">
                    <div class="flip-card-inner">
                        <div class="flip-card-front">
                            <p>Iceland</p>
                        </div>
                        <div class="flip-card-back">
                            <p>Reykjavik</p>
                        </div>
                    </div>
                </div>
                <div class="flip-card">
                    <div class="flip-card-inner">
                        <div class="flip-card-front">
                            <p>Madagascar</p>
                        </div>
                        <div class="flip-card-back">
                            <p>Antananarivo</p>
                        </div>
                    </div>
                </div>
                <div class="flip-card">
                    <div class="flip-card-inner">
                        <div class="flip-card-front">
                            <p>Russia</p>
                        </div>
                        <div class="flip-card-back">
                            <p>¡Hell!</p>
                        </div>
                    </div>
                </div>
                <div class="flip-card">
                    <div class="flip-card-inner">
                        <div class="flip-card-front">
                            <p>Qatar</p>
                        </div>
                        <div class="flip-card-back">
                            <p>Doha</p>
                        </div>
                    </div>
                </div>
                <div class="flip-card">
                    <div class="flip-card-inner">
                        <div class="flip-card-front">
                            <p>Senegal</p>
                        </div>
                        <div class="flip-card-back">
                            <p>Dakar</p>
                        </div>
                    </div>
                </div>
                <div class="flip-card">
                    <div class="flip-card-inner">
                        <div class="flip-card-front">
                            <p>United States</p>
                        </div>
                        <div class="flip-card-back">
                            <p>Washington D.C.</p>
                        </div>
                    </div>
                </div>
                <div class="flip-card">
                    <div class="flip-card-inner">
                        <div class="flip-card-front">
                            <p>Spain</p>
                        </div>
                        <div class="flip-card-back">
                            <p>Madrid</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </body>
</html>
